<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<!-- Make this look like a standalone iOS app when added to Home Screen. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shopping">
<meta name="theme-color" content="#26a69a">

<!-- iOS only renders PNG/JPG for apple-touch-icon (SVG and data: URIs
     silently fall back to the host's default icon). 180x180 PNG is the
     "1x" Home Screen size on every modern iPhone/iPad. -->
<link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
<link rel="icon" type="image/svg+xml" href="./icon.svg">

<style>
html, body {
  margin: 0; padding: 0; height: 100%;
  background: #26a69a; color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.wrap {
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px; box-sizing: border-box;
  text-align: center;
}
.icon { width: 120px; height: 120px; border-radius: 26px; margin-bottom: 24px; }
h1 { font-size: 22px; font-weight: 600; margin: 0 0 8px; }
p { font-size: 16px; opacity: 0.9; margin: 4px 0; line-height: 1.4; max-width: 340px; }
.cta {
  margin-top: 24px;
  padding: 12px 24px; border-radius: 12px;
  background: rgba(255,255,255,0.18); color: white;
  font-size: 16px; text-decoration: none;
  border: 1px solid rgba(255,255,255,0.3);
}
.spinner { font-size: 17px; opacity: 0.85; }
</style>
</head>
<body>
<div class="wrap" id="landing" hidden>
  <img class="icon" src="./icon.png" alt="">
  <h1>Shopping</h1>
  <p>Tap <strong>Share</strong> → <strong>Add to Home Screen</strong> to install
  the shopping list as an app.</p>
  <p style="opacity:0.7; font-size:14px; margin-top:16px;">Already installed?
  Open it from the cart icon on your Home Screen.</p>
  <a class="cta" href="https://wooaeilbttvus6etixtt2izabobprcoj.ui.nabu.casa/shopping-list/list">Open shopping list anyway</a>
</div>
<div class="wrap" id="loading" hidden>
  <div class="spinner">Loading shopping list…</div>
</div>
<script>
  // Only auto-redirect when launched from the Home Screen icon (iOS
  // standalone mode). When viewed in Safari, stay put so the user can
  // tap Share → Add to Home Screen — iOS captures the icon from the
  // currently visible page, so a 0-second redirect would defeat the
  // whole purpose of this wrapper.
  var standalone =
    window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  document.getElementById(standalone ? 'loading' : 'landing').hidden = false;
  if (standalone) {
    window.location.replace('https://wooaeilbttvus6etixtt2izabobprcoj.ui.nabu.casa/shopping-list/list');
  }
</script>
</body>
</html>
